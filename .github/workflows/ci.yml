name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: '17'

jobs:
  # Fast code quality checks - runs first, fails fast
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint and detekt
        run: ./gradlew ktlintCheck detekt --no-daemon

      - name: Upload detekt reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/'

  # Build and test KMP modules (Core and UI)
  build-kmp:
    name: Build & Test KMP Core
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission
        run: chmod +x gradlew scripts/**/*.sh

      - name: Build KMP Core and UI
        run: ./gradlew :spectra-core:build :spectra-ui:build -x test

      - name: Run KMP Tests
        run: ./gradlew :spectra-core:allTests :spectra-ui:allTests

      - name: Generate Test Coverage
        run: ./gradlew :spectra-core:jacocoTestReport :spectra-ui:koverHtmlReport || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: |
            ./spectra-core/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            ./spectra-ui/build/reports/kover/report.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kmp-test-results
          path: '**/build/test-results/**/*.xml'

      # Cache build outputs for dependent jobs
      - name: Cache KMP build
        uses: actions/cache/save@v4
        with:
          path: |
            spectra-core/build
            spectra-ui/build
            ~/.gradle/caches
          key: kmp-build-${{ github.sha }}

  # Build Android (runs in parallel with iOS after KMP)
  build-android:
    name: Build & Test Android
    runs-on: ubuntu-latest
    needs: build-kmp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Restore KMP build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            spectra-core/build
            spectra-ui/build
            ~/.gradle/caches
          key: kmp-build-${{ github.sha }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Android Example
        run: ./gradlew :examples:android-native:app:assembleDebug

      - name: Run Android Example Tests
        run: ./gradlew :examples:android-native:app:testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: examples/android-native/app/build/outputs/apk/debug/*.apk

  # Build iOS (runs in parallel with Android after KMP)
  build-ios:
    name: Build & Test iOS
    runs-on: macos-15
    needs: build-kmp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Restore KMP build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            spectra-core/build
            spectra-ui/build
            ~/.gradle/caches
          key: kmp-build-${{ github.sha }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Grant execute permission
        run: chmod +x gradlew scripts/**/*.sh

      - name: Build iOS XCFrameworks
        run: |
          ./gradlew :spectra-core:assembleSpectraLoggerReleaseXCFramework
          ./gradlew :spectra-ui:assembleSpectraLoggerUIReleaseXCFramework

      - name: Setup XCFrameworks for local development
        run: |
          # Create the expected directory structure for the root Package.swift
          mkdir -p build/xcframework
          cp -R spectra-core/build/XCFrameworks/release/SpectraLogger.xcframework build/xcframework/
          cp -R spectra-ui/build/XCFrameworks/release/SpectraLoggerUI.xcframework build/xcframework/
          echo "✅ XCFrameworks copied to build/xcframework/"
          ls -la build/xcframework/

      - name: Build iOS Example App
        run: |
          cd examples/ios-native
          # Use local development environment for Package.swift
          export SPECTRA_LOCAL_DEV=1
          xcodebuild -scheme "SpectraExample" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build CODE_SIGNING_ALLOWED=NO

      - name: Upload XCFrameworks
        uses: actions/upload-artifact@v4
        with:
          name: SpectraLogger-xcframeworks
          path: |
            spectra-core/build/XCFrameworks/release/SpectraLogger.xcframework
            spectra-ui/build/XCFrameworks/release/SpectraLoggerUI.xcframework

  # Final status check for branch protection
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [code-quality, build-kmp, build-android, build-ios]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.build-kmp.result }}" != "success" ]] || \
             [[ "${{ needs.build-android.result }}" != "success" ]] || \
             [[ "${{ needs.build-ios.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"
