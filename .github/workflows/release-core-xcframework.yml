name: Release XCFrameworks

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0 without v prefix)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Grant execute permission for scripts
        run: |
          find scripts -type f -name "*.sh" -exec chmod +x {} \;
          chmod +x gradlew

      - name: Set version variables
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG_NAME="v${VERSION}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build XCFrameworks
        id: build
        run: |
          ./scripts/release/create-release.sh ${{ steps.version.outputs.version }}
          
          CORE_CHECKSUM=$(cat build/releases/${{ steps.version.outputs.version }}/SpectraLogger-checksum.txt)
          UI_CHECKSUM=$(cat build/releases/${{ steps.version.outputs.version }}/SpectraLoggerUI-checksum.txt)
          
          echo "core_checksum=$CORE_CHECKSUM" >> $GITHUB_OUTPUT
          echo "ui_checksum=$UI_CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update and commit Package.swift
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CORE_CHECKSUM="${{ steps.build.outputs.core_checksum }}"
          UI_CHECKSUM="${{ steps.build.outputs.ui_checksum }}"

          # Update Core target
          perl -i -pe "s|name: \"SpectraLogger\",\s*url: \"https://github.com/snooky23/spectra/releases/download/v.*/SpectraLogger.xcframework.zip\",\s*checksum: \".*\"|name: \"SpectraLogger\", url: \"https://github.com/snooky23/spectra/releases/download/v${VERSION}/SpectraLogger.xcframework.zip\", checksum: \"${CORE_CHECKSUM}\"|g" Package.swift
          
          # Update UI target (Note: This might need more precise regex based on the file content)
          perl -i -pe "s|name: \"SpectraLoggerUI\",\s*url: \"https://github.com/snooky23/spectra/releases/download/v.*/SpectraLoggerUI.xcframework.zip\",\s*checksum: \".*\"|name: \"SpectraLoggerUI\", url: \"https://github.com/snooky23/spectra/releases/download/v${VERSION}/SpectraLoggerUI.xcframework.zip\", checksum: \"${UI_CHECKSUM}\"|g" Package.swift

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: update Package.swift for v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.tag }}"
          
          gh release create "${TAG_NAME}" \
            build/releases/${VERSION}/SpectraLogger.xcframework.zip \
            build/releases/${VERSION}/SpectraLoggerUI.xcframework.zip \
            --title "Release ${VERSION}" \
            --generate-notes

      - name: Create and push tag
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"
